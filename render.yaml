services:
  - type: web
    name: naveen-portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health/liveness
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://portfolio-website-1.onrender.com,https://portfolio-website-26h7.onrender.com
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "1"
      - key: DB_KEEPALIVE_TIME_MS
        value: "300000"
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: "15000"
      - key: SMTP_READ_TIMEOUT_MS
        value: "15000"
      - key: SMTP_WRITE_TIMEOUT_MS
        value: "15000"
      - key: EMAIL_RETRY_MAX_ATTEMPTS
        value: "3"
      - key: DB_RETRY_MAX_ATTEMPTS
        value: "3"
  - type: web
    name: portfolio-website-1
    runtime: static
    rootDir: .
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://portfolio-website-26h7.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
