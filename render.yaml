services:
  - type: web
    name: naveen-portfolio-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/analytics/metrics
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://portfolio-website-1.onrender.com,https://portfolio-website-26h7.onrender.com
  - type: web
    name: portfolio-website-1
    runtime: static
    rootDir: .
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://portfolio-website-26h7.onrender.com/api
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
