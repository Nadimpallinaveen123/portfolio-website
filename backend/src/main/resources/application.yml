server:
  port: ${PORT:10000}

spring:
  application:
    name: naveen-portfolio
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
    username: ${SPRING_DATASOURCE_USERNAME:portfolio_user}
    password: ${SPRING_DATASOURCE_PASSWORD:portfolio_pass}
    hikari:
      pool-name: PortfolioHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:300000}
      initialization-fail-timeout: 0
      connection-test-query: SELECT 1
      data-source-properties:
        tcpKeepAlive: true
        ApplicationName: naveen-portfolio-render
    # Jakarta persistence URL fallback (some Hibernate versions look for this key)
    jakarta:
      persistence:
        jdbc:
          url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        # Force a dialect when JDBC metadata is unavailable at startup
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: ${SMTP_CONNECTION_TIMEOUT_MS:15000}
          timeout: ${SMTP_READ_TIMEOUT_MS:15000}
          writetimeout: ${SMTP_WRITE_TIMEOUT_MS:15000}
          pool: true
          "pool.size": ${SMTP_POOL_SIZE:3}
          quitwait: false
          starttls:
            enable: true
            required: true

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,https://portfolio-website-1.onrender.com,https://portfolio-website-26h7.onrender.com}
  jwt:
    secret: ${JWT_SECRET:change-this-local-development-secret-change-this-local-development-secret}
    issuer: naveen-portfolio
    admin-token-minutes: 480
    download-token-minutes: 15
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:change-this-admin-password}
  owner-email: ${OWNER_EMAIL:nadimpallinaveen2@gmail.com}
  email:
    async:
      core-pool-size: ${EMAIL_ASYNC_CORE_POOL_SIZE:2}
      max-pool-size: ${EMAIL_ASYNC_MAX_POOL_SIZE:4}
      queue-capacity: ${EMAIL_ASYNC_QUEUE_CAPACITY:100}
    retry:
      max-attempts: ${EMAIL_RETRY_MAX_ATTEMPTS:3}
      initial-delay-ms: ${EMAIL_RETRY_INITIAL_DELAY_MS:2000}
      max-delay-ms: ${EMAIL_RETRY_MAX_DELAY_MS:15000}
      multiplier: ${EMAIL_RETRY_MULTIPLIER:2.0}
  database:
    retry:
      max-attempts: ${DB_RETRY_MAX_ATTEMPTS:3}
      initial-delay-ms: ${DB_RETRY_INITIAL_DELAY_MS:1000}
      max-delay-ms: ${DB_RETRY_MAX_DELAY_MS:8000}
      multiplier: ${DB_RETRY_MULTIPLIER:2.0}
  resume:
    classpath-location: resume/NaveenNadimpalli_JFS_updated_resume.pdf

logging:
  level:
    com.naveen.portfolio: INFO
    com.zaxxer.hikari: INFO
    org.springframework.mail: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
