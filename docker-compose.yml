services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio_user
      POSTGRES_PASSWORD: portfolio_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio
      SPRING_DATASOURCE_USERNAME: portfolio_user
      SPRING_DATASOURCE_PASSWORD: portfolio_pass
      JWT_SECRET: change-this-local-secret-change-this-local-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: change-this-admin-password
      SPRING_MAIL_USERNAME: your-gmail@gmail.com
      SPRING_MAIL_PASSWORD: your-gmail-app-password
      OWNER_EMAIL: nadimpallinaveen2@gmail.com
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"

volumes:
  postgres-data:
